default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check --fix --force-exclude
        language: system
        types_or: [python, pyi]
        stages: [pre-commit]

      - id: compile-jonq
        name: compile jonq package
        entry: python -m compileall -q jonq
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: pytest-smoke
        name: pytest smoke
        entry: pytest -q tests/test_semantic_regressions.py tests/jq_main_test.py
        language: system
        pass_filenames: false
        stages: [pre-push]
